{{ define "main" }}
<div class="profile-header">
    <img src="/img/profile-photo.svg" alt="Profilbild" class="profile-photo">
    <h1>{{ .Site.Params.author }}</h1>
    <p>{{ .Site.Params.description }}</p>

    <div class="links">
        {{ range .Site.Params.socialLinks }}
        <a href="{{ .url }}" class="icon-button" title="{{ .name }}">
                {{ partial (printf "icons/%s.svg" (lower .name)) . }}
        {{ end }}
    </div>
</div>

{{ end }}
